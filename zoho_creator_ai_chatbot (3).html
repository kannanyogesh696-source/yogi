<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoho Creator Gemini AI Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f42;
    --accent: #4285f4;
    --accent2: #34a853;
    --text: #e8eaf0;
    --text2: #8b90a7;
    --user-bubble: linear-gradient(135deg, #4285f4, #0f9d58);
    --bot-bubble: #1e2230;
    --success: #3ecf8e;
    --radius: 16px;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .logo {
    width: 40px; height: 40px;
    background: var(--user-bubble);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  .header-info h2 { font-size: 15px; font-weight: 600; color: var(--text); }
  .header-info p  { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 5px; }

  .status-dot {
    width: 6px; height: 6px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .header-actions { margin-left: auto; display: flex; gap: 8px; }

  .btn-icon {
    width: 34px; height: 34px;
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text2);
    font-size: 14px;
    transition: all 0.2s;
  }
  .btn-icon:hover { background: var(--border); color: var(--text); }

  .quick-bar {
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .quick-bar::-webkit-scrollbar { display: none; }

  .chip {
    padding: 6px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px; font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
    user-select: none;
  }
  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(66,133,244,0.08);
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .welcome { text-align: center; padding: 30px 20px; animation: fadeUp 0.5s ease; }
  .welcome-icon { font-size: 48px; margin-bottom: 12px; }
  .welcome h3 {
    font-size: 20px; font-weight: 700; margin-bottom: 8px;
    background: var(--user-bubble);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .welcome p { font-size: 13px; color: var(--text2); line-height: 1.6; }

  .msg-row { display: flex; gap: 10px; animation: fadeUp 0.3s ease; max-width: 100%; }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; align-self: flex-end;
  }
  .avatar.bot  { background: var(--user-bubble); }
  .avatar.user { background: var(--surface2); border: 1px solid var(--border); }

  .bubble {
    max-width: calc(100% - 80px);
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px; line-height: 1.6;
  }
  .bubble.bot {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .bubble.user {
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
    color: white;
  }

  .typing { display: flex; gap: 5px; padding: 14px 16px; align-items: center; }
  .dot {
    width: 6px; height: 6px;
    background: var(--text2);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40%            { transform: translateY(-6px); opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .input-area {
    padding: 12px 16px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 8px 8px 14px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }

  .chat-input {
    flex: 1;
    background: none; border: none; outline: none;
    color: var(--text);
    font-size: 14px; font-family: inherit;
    resize: none; max-height: 100px;
    line-height: 1.5; padding: 4px 0;
  }
  .chat-input::placeholder { color: var(--text2); }

  .send-btn {
    width: 36px; height: 36px;
    background: var(--user-bubble);
    border: none; border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .send-btn:hover  { opacity: 0.9; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .input-footer { text-align: center; font-size: 11px; color: var(--text2); margin-top: 8px; opacity: 0.6; }

  code         { background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  strong       { font-weight: 600; }
  p            { margin-bottom: 6px; }
  p:last-child { margin-bottom: 0; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">✨</div>
  <div class="header-info">
    <h2>Zoho Creator AI</h2>
    <p><span class="status-dot"></span> Gemini x Zoho Connected</p>
  </div>
  <div class="header-actions">
    <button class="btn-icon" id="clearBtn" title="Clear chat">🗑️</button>
  </div>
</div>

<div class="quick-bar" id="quickBar">
  <div class="chip" data-msg="என்னோட எல்லா apps காட்டு">📱 My Apps</div>
  <div class="chip" data-msg="எல்லா forms list பண்ணு">📋 All Forms</div>
  <div class="chip" data-msg="எல்லா reports காட்டு">📊 Reports</div>
  <div class="chip" data-msg="Latest records எடு">🗃️ Latest Records</div>
  <div class="chip" data-msg="Workspace summary தா">🏢 Summary</div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome">
    <div class="welcome-icon">🚀</div>
    <h3>Zoho Creator AI Assistant</h3>
    <p>உங்கள் Zoho Creator data பத்தி என்னையும் கேளுங்க!<br>Apps, Forms, Reports, Records — எல்லாம் தெரியும் எனக்கு.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea
      class="chat-input"
      id="chatInput"
      placeholder="உங்கள் Zoho Creator பத்தி கேளுங்க..."
      rows="1"
    ></textarea>
    <button class="send-btn" id="sendBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="input-footer">Powered by Gemini AI x Zoho Creator</div>
</div>

<script>
(function () {
  "use strict";

  // ============================================================
  // CONFIGURATION — உங்கள் details இங்க மாத்துங்க
  // ============================================================
  var CONFIG = {
    geminiApiKey     : "AIzaSyCf_wnyizBgJ6paKu3vfM_fCiJNCcpRDMo",        // https://aistudio.google.com/apikey
    geminiModel      : "gemini-3.1-flash-lite-preview",
    zohoAccessToken  : "1000.75cfe78e04952acd79c458e112038817.f4d33b21e7cfd56a752d3efa4759cc10",
    zohoAccountOwner : "yogeshkannan07",
    zohoAppLinkName  : "supermarket-management-system",
    zohoRegion       : "in"                          // "com" | "in" | "eu" | "au" | "jp"
  };
  // ============================================================

  var GEMINI_API = "https://generativelanguage.googleapis.com/v1beta/models/"
                 + CONFIG.geminiModel + ":generateContent";
  var ZOHO_BASE  = "https://creator.zoho." + CONFIG.zohoRegion + "/api/v2";

  var conversationHistory = [];
  var isLoading = false;

  // DOM refs
  var chatArea  = document.getElementById("chatArea");
  var chatInput = document.getElementById("chatInput");
  var sendBtn   = document.getElementById("sendBtn");
  var clearBtn  = document.getElementById("clearBtn");
  var quickBar  = document.getElementById("quickBar");

  // ── Wire up ALL events here — zero inline handlers ─────────

  sendBtn.addEventListener("click", sendMessage);

  clearBtn.addEventListener("click", clearChat);

  chatInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  chatInput.addEventListener("input", function () {
    chatInput.style.height = "auto";
    chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + "px";
  });

  // Single delegated listener for all chips
  quickBar.addEventListener("click", function (e) {
    var chip = e.target.closest(".chip");
    if (chip) {
      chatInput.value = chip.getAttribute("data-msg");
      sendMessage();
    }
  });

  // ── Zoho Creator REST API helpers ──────────────────────────

  function zohoHeaders() {
    return {
      "Authorization" : "Zoho-oauthtoken " + CONFIG.zohoAccessToken,
      "Content-Type"  : "application/json"
    };
  }

  function zohoFetch(path) {
    return fetch(ZOHO_BASE + path, { headers: zohoHeaders() })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .catch(function (e) { return { error: e.message }; });
  }

  function getApplications() {
    return zohoFetch("/" + CONFIG.zohoAccountOwner + "/");
  }
  function getForms(app) {
    return zohoFetch("/" + CONFIG.zohoAccountOwner + "/" + (app || CONFIG.zohoAppLinkName) + "/form");
  }
  function getReports(app) {
    return zohoFetch("/" + CONFIG.zohoAccountOwner + "/" + (app || CONFIG.zohoAppLinkName) + "/report");
  }
  function getRecords(app, report, limit) {
    return zohoFetch("/" + CONFIG.zohoAccountOwner + "/" + (app || CONFIG.zohoAppLinkName)
                   + "/" + report + "?max_records=" + (limit || 10));
  }

  function fetchRelevantZohoData(query) {
    var q    = query.toLowerCase();
    var data = {};
    var tasks = [];

    if (q.indexOf("app") > -1 || q.indexOf("workspace") > -1 || q.indexOf("summary") > -1) {
      tasks.push(getApplications().then(function (r) { data.applications = r; }));
    }
    if (q.indexOf("form") > -1 || q.indexOf("படிவம்") > -1) {
      tasks.push(getForms().then(function (r) { data.forms = r; }));
    }
    if (q.indexOf("report") > -1 || q.indexOf("ரிப்போர்ட்") > -1) {
      tasks.push(getReports().then(function (r) { data.reports = r; }));
    }
    if (q.indexOf("record") > -1 || q.indexOf("data") > -1 || q.indexOf("latest") > -1 || q.indexOf("list") > -1 || q.indexOf("தகவல்") > -1) {
      tasks.push(
        getReports().then(function (r) {
          data.reports = r;
          if (r.reports && r.reports.length > 0) {
            return getRecords(CONFIG.zohoAppLinkName, r.reports[0].link_name, 15)
              .then(function (rec) {
                data.records     = rec;
                data.recordsFrom = r.reports[0].display_name;
              });
          }
        })
      );
    }

    if (tasks.length === 0) {
      tasks.push(getForms().then(function (r)   { data.forms   = r; }));
      tasks.push(getReports().then(function (r) { data.reports = r; }));
    }

    return Promise.all(tasks).then(function () { return data; });
  }

  // ── Gemini API ─────────────────────────────────────────────

  function callGemini(userMessage, zohoData) {
    var systemCtx =
      "You are an AI assistant inside a Zoho Creator app.\n" +
      "User asked: \"" + userMessage + "\"\n\n" +
      "Live Zoho Creator data:\n" + JSON.stringify(zohoData, null, 2) + "\n\n" +
      "Rules:\n" +
      "1. Answer using the above data only.\n" +
      "2. Use emojis and clean formatting.\n" +
      "3. Format records in a readable way.\n" +
      "4. Reply in the same language as the user (Tamil/English/Tanglish).\n" +
      "5. If data shows errors, suggest checking API keys/config.";

    var history = conversationHistory.slice(-6).map(function (m) {
      return { role: m.role === "assistant" ? "model" : "user", parts: [{ text: m.content }] };
    });

    var body = {
      system_instruction : { parts: [{ text: systemCtx }] },
      contents           : history.concat([{ role: "user", parts: [{ text: userMessage }] }]),
      generationConfig   : { temperature: 0.7, maxOutputTokens: 2000 }
    };

    return fetch(GEMINI_API + "?key=" + CONFIG.geminiApiKey, {
      method  : "POST",
      headers : { "Content-Type": "application/json" },
      body    : JSON.stringify(body)
    })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d.error) throw new Error(d.error.message);
      return (d.candidates && d.candidates[0] &&
              d.candidates[0].content && d.candidates[0].content.parts &&
              d.candidates[0].content.parts[0].text) || "Response கிடைக்கலை.";
    });
  }

  // ── UI helpers ─────────────────────────────────────────────

  function clearChat() {
    conversationHistory = [];
    chatArea.innerHTML =
      "<div class='welcome'>" +
        "<div class='welcome-icon'>🚀</div>" +
        "<h3>Zoho Creator AI Assistant</h3>" +
        "<p>உங்கள் Zoho Creator data பத்தி என்னையும் கேளுங்க!<br>" +
        "Apps, Forms, Reports, Records — எல்லாம் தெரியும் எனக்கு.</p>" +
      "</div>";
  }

  function addMessage(role, content, isHTML) {
    var row    = document.createElement("div");
    row.className = "msg-row " + role;

    var avatar = document.createElement("div");
    avatar.className   = "avatar " + role;
    avatar.textContent = role === "bot" ? "✨" : "👤";

    var bubble = document.createElement("div");
    bubble.className = "bubble " + role;
    if (isHTML) bubble.innerHTML  = content;
    else        bubble.textContent = content;

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping(label) {
    var row = document.createElement("div");
    row.className = "msg-row bot";
    row.id        = "typingRow";

    var avatar = document.createElement("div");
    avatar.className   = "avatar bot";
    avatar.textContent = "✨";

    var bubble = document.createElement("div");
    bubble.className = "bubble bot";
    bubble.innerHTML  =
      "<div class='typing'>" +
        "<div class='dot'></div><div class='dot'></div><div class='dot'></div>" +
        "<span style='font-size:11px;color:var(--text2);margin-left:6px'>" +
          (label || "யோசிக்கிறேன்...") + "</span>" +
      "</div>";

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    var t = document.getElementById("typingRow");
    if (t) t.parentNode.removeChild(t);
  }

  function formatResponse(text) {
    var html = text
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.+?)\*/g,     "<em>$1</em>")
      .replace(/`(.+?)`/g,       "<code>$1</code>")
      .replace(/\n\n/g,          "</p><p>")
      .replace(/\n/g,            "<br>");
    return "<p>" + html + "</p>";
  }

  // ── Main send ──────────────────────────────────────────────

  function sendMessage() {
    var text = chatInput.value.trim();
    if (!text || isLoading) return;

    if (CONFIG.geminiApiKey === "AIzaSyCf_wnyizBgJ6paKu3vfM_fCiJNCcpRDMo") {
      addMessage("bot",
        "⚠️ CONFIG.geminiApiKey-ல உங்கள் Gemini API Key போடுங்க!\n" +
        "https://aistudio.google.com/apikey இல் free-ஆ எடுக்கலாம்.");
      return;
    }

    isLoading = true;
    sendBtn.disabled    = true;
    chatInput.value     = "";
    chatInput.style.height = "auto";

    addMessage("user", text);
    conversationHistory.push({ role: "user", content: text });

    showTyping("Zoho data fetch பண்றேன்...");

    fetchRelevantZohoData(text)
      .then(function (zohoData) {
        removeTyping();
        showTyping("Gemini AI யோசிக்குது...");
        return callGemini(text, zohoData);
      })
      .then(function (reply) {
        removeTyping();
        addMessage("bot", formatResponse(reply), true);
        conversationHistory.push({ role: "assistant", content: reply });
      })
      .catch(function (err) {
        removeTyping();
        addMessage("bot", "⚠️ Error: " + err.message + "\nAPI key அல்லது Zoho token check பண்ணுங்க.");
      })
      .finally(function () {
        isLoading          = false;
        sendBtn.disabled   = false;
        chatInput.focus();
      });
  }

})();
</script>

</body>
</html>
